name: Weekly algae feed update

# Runs every Thursday at 20:00 UTC (~Friday morning AEST), just after
# Goulburn-Murray Water's weekly refresh. Also runnable on demand.
on:
  schedule:
    - cron: '0 20 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper deps
        working-directory: scrape
        run: npm install

      - name: Build data.json
        working-directory: scrape
        run: node scrape.js

      - name: Commit if the feed changed
        run: |
          git config user.name  "algae-bot"
          git config user.email "bot@bluegreenalgaealert.com.au"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "Weekly algae feed update"
            git push
          else
            echo "No change to data.json"
          fi

      # If Netlify is set to auto-deploy from this repo, the push above is
      # enough. If you deploy manually, add a Netlify build hook as the secret
      # NETLIFY_BUILD_HOOK and uncomment the step below.
      # - name: Trigger Netlify build
      #   run: curl -fsSL -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
